<body>
<header>
    <div class="header">
        <h1 class="title-font"><a href="index.html">SGR Studios</a><span class="newData">2021 - <span class="year"></span></span></h1>
        <ul class="header_list">
            <li><button class="lang-toggle" data-lang="ru">EN</button></li>
            <li><h2 class="title-font"><a href="about.html" data-i18n="about">About</a></h2></li>
            <li><h2 class="title-font"><a href="util.html" data-i18n="util">Utilities</a></h2></li>
        </ul>
    </div>
</header>
<div id="window-id">
    <h1 class="title-font" id="id-soon"><span data-i18n="until_id">До открытия </span><span class="gradient" id="id-title">Industrial Dawn</span></h1>
    <h1 class="title-font" id="id-now"><a href="https://discord.gg/industrialdawn" target="_blank" data-i18n="id_open">Сервер открыт! (нажми)</a></h1>
    <div class="countdown">
        <div class="time">
            <h2 id="days">0</h2>
            <p data-i18n="days_cd">Дней</p>
        </div>
        <div class="time">
            <h2 id="hours">0</h2>
            <p data-i18n="hours_cd">Часов</p>
        </div>
        <div class="time">
            <h2 id="minutes">0</h2>
            <p data-i18n="minutes_cd">Минут</p>
        </div>
        <div class="time">
            <h2 id="seconds">0</h2>
            <p data-i18n="seconds_cd">Секунд</p>
        </div>
    </div>
    <audio autoplay="autoplay" loop controls>
        <source src="res/countdown.flac" type="audio/ogg">
    </audio>
</div>
<div class="footer">
    <h1 class="title-font">SGR Studios<br>2021 - <span class="year"></span></h1>
</div>

</html>
<script>
    document.querySelectorAll('.year').forEach(element => {
        element.textContent = new Date().getFullYear();
    });
</script>
